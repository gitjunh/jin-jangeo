name: Deploy Restaurant PWA

on:
  push:
    branches: [main]
    paths:
      - 'restaurant/**'
      - 'shared/**'
      - '.github/workflows/deploy-restaurant.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: restaurant/package-lock.json

      - name: Build restaurant
        working-directory: restaurant
        env:
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
          VITE_GITHUB_OWNER: gitjunh
          VITE_GITHUB_REPO: jin-jangeo
          VITE_GITHUB_BRANCH: gh-pages
        run: npm ci && npm run build

      - name: Merge admin data from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          for f in menu.json gallery.json restaurant.json videos.json; do
            if git show origin/gh-pages:data/"$f" > /tmp/gh-"$f" 2>/dev/null; then
              if [ -s /tmp/gh-"$f" ]; then
                cp /tmp/gh-"$f" restaurant/dist/data/"$f"
                echo "Using gh-pages data/$f"
              else
                echo "Skip empty gh-pages data/$f"
              fi
            fi
          done

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: restaurant/dist
          publish_branch: gh-pages
          keep_files: true
          # media는 어드민 업로드 보존 (data는 위 merge 후 항상 배포)
          exclude_assets: |
            media
